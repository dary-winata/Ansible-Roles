---
# install docker
- name: uninstall all previous docker
  yum:
    name:
    - docker
    - docker-client
    - docker-client-latest
    - docker-common
    - docker-latest
    - docker-latest-logrotate
    - docker-logrotate
    - docker-engine
  state: removed

- name: install docker rpm from repo
  yum:
    name: https://download.docker.com/linux/centos/docker-ce.repo
    state: present

- name: install docker
  yum:
    name:
    - docker-ce-"{{ docker_version }}"
    - docker-ce-"{{ docker_version }}"
    - containerd.io-"{{ docker_version }}"

- name: enable and start docker
  systemd:
    name: docker
    state: started
    enabled: yes
